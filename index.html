<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#16213e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>仓库抽检</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ====== Page: Home ====== -->
    <div id="page-home" class="page active">
      <div class="header">
        <h1>仓库抽检</h1>
        <div class="header-actions">
          <button class="btn btn-sm btn-secondary" id="btn-refresh" title="刷新页面" onclick="App._doRefresh()">&#128260; 刷新</button>
        </div>
      </div>

      <!-- 数据状态卡 -->
      <div class="data-status-card" id="data-status-card">
        <div class="data-status-icon" id="data-status-icon">&#128230;</div>
        <div class="data-status-info">
          <div class="data-status-title" id="data-status-title">正在加载数据...</div>
          <div class="data-status-desc" id="data-status-desc">请稍候</div>
        </div>
      </div>

      <!-- 开始抽检按钮 -->
      <button class="btn btn-primary btn-block" id="btn-start-inspection" style="margin-top:20px;">
        &#128247; 开始抽检
      </button>
    </div>

    <!-- ====== Page: Inspection Scanner ====== -->
    <div id="page-scanner" class="page">
      <div class="header">
        <button class="btn-back" id="btn-back-home">&#8592;</button>
        <h1>抽检扫码</h1>
      </div>
      <div id="scanner-container"></div>
      <div id="inspection-result-area"></div>
      <div id="inspection-actions" class="inspection-actions" style="display:none;">
        <button class="btn btn-primary btn-block" id="btn-continue-scan">&#128247; 继续抽检</button>
        <button class="btn btn-secondary btn-block" id="btn-cancel-scan">&#10005; 结束抽检</button>
      </div>
      <div id="recent-inspections"></div>
    </div>

  </div>

  <!-- ====== Footer ====== -->
  <div id="app-footer">
    <span>SupplyWise &copy;</span>
    <span id="footer-version"></span>
  </div>

  <!-- ====== Toast ====== -->
  <div class="toast" id="toast"></div>

  <!-- ====== Scripts ====== -->
  <script src="libs/html5-qrcode.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
